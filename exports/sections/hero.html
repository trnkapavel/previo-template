<section data-export-section="hero" data-hero-slider="light" class="relative pt-32 pb-20 md:pt-40 md:pb-32 overflow-hidden">
  <div class="absolute inset-0 -z-10 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-primary-50/50 via-white to-white"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid lg:grid-cols-2 gap-12 lg:gap-16 items-center">
      <div class="text-left z-20">
        <div class="inline-flex items-center gap-2 text-sm font-medium mb-8">
          <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-primary-500"></span>
          </span>
          <span class="text-primary-700">Hotelový systém</span>
        </div>

        <h1 data-hero-title class="text-4xl md:text-5xl lg:text-6xl font-bold font-outfit tracking-tight text-slate-900 mb-6 leading-[1.1]">
          Spravujte svůj hotel, penzion i apartmány z jednoho místa
        </h1>

        <p data-hero-description class="text-lg md:text-xl text-slate-600 mb-10 max-w-xl leading-relaxed">
          Přidejte se k více jak 4 000 spokojeným klientům. Previo je nejpoužívanější hotelový systém v Česku.
        </p>

        <div class="flex flex-col sm:flex-row items-center gap-4">
          <a
            data-hero-primary
            href="#"
            class="w-full sm:w-auto px-8 py-4 bg-primary-600 text-white rounded-[3px] font-medium text-lg hover:bg-primary-700 transition-all hover:shadow-lg hover:shadow-primary-600/20 flex items-center justify-center gap-2 group"
          >
            <span data-hero-primary-text>Zjistěte více</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-right w-5 h-5 group-hover:translate-x-1 transition-transform"
            >
              <path d="M5 12h14"></path>
              <path d="m12 5 7 7-7 7"></path>
            </svg>
          </a>

          <button
            class="w-full sm:w-auto px-8 py-4 bg-white text-slate-700 border border-slate-200 rounded-[3px] font-medium text-lg hover:bg-slate-50 transition-all flex items-center justify-center gap-2 group"
          >
            <div
              class="relative w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center group-hover:bg-primary-50 transition-colors"
            >
              <span
                class="absolute inset-0 rounded-full border border-primary-300 animate-ping opacity-0 group-hover:opacity-60"
              ></span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="currentColor"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-play w-3 h-3 text-slate-600 group-hover:text-primary-600 relative z-10"
              >
                <polygon points="6 3 20 12 6 21 6 3"></polygon>
              </svg>
            </div>
            Přehrát video
          </button>
        </div>

        <div class="mt-12 flex flex-wrap gap-6">
          <div class="flex items-center gap-2 text-slate-500 text-sm font-medium">
            <div class="p-2 bg-white rounded-[3px] border border-slate-100 shadow-sm">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-hotel w-4 h-4 text-primary-600"
              >
                <path d="M10 22v-6.57"></path>
                <path d="M12 11h.01"></path>
                <path d="M12 7h.01"></path>
                <path d="M14 15.43V22"></path>
                <path d="M15 16a5 5 0 0 0-6 0"></path>
                <path d="M16 11h.01"></path>
                <path d="M16 7h.01"></path>
                <path d="M8 11h.01"></path>
                <path d="M8 7h.01"></path>
                <rect x="4" y="2" width="16" height="20" rx="2"></rect>
              </svg>
            </div>
            <span>Hotely</span>
          </div>

          <div class="flex items-center gap-2 text-slate-500 text-sm font-medium">
            <div class="p-2 bg-white rounded-[3px] border border-slate-100 shadow-sm">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-building2 w-4 h-4 text-primary-600"
              >
                <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path>
                <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path>
                <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"></path>
                <path d="M10 6h4"></path>
                <path d="M10 10h4"></path>
                <path d="M10 14h4"></path>
                <path d="M10 18h4"></path>
              </svg>
            </div>
            <span>Penziony</span>
          </div>

          <div class="flex items-center gap-2 text-slate-500 text-sm font-medium">
            <div class="p-2 bg-white rounded-[3px] border border-slate-100 shadow-sm">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-house w-4 h-4 text-primary-600"
              >
                <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path>
                <path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              </svg>
            </div>
            <span>Apartmány</span>
          </div>
        </div>

        <!-- Progress dots pro slider -->
        <div class="mt-12 flex gap-3 items-center">
          <button
            aria-label="Slide 1"
            class="relative h-2.5 rounded-full overflow-hidden transition-all duration-300 cursor-pointer w-20 bg-slate-200"
          >
            <div
              class="absolute inset-y-0 left-0 bg-primary-600 rounded-full"
              style="width:100%;transform-origin:left;animation:heroProgress 8000ms linear forwards;animation-play-state:running"
            ></div>
          </button>
          <button
            aria-label="Slide 2"
            class="relative h-2.5 rounded-full overflow-hidden transition-all duration-300 cursor-pointer w-8 bg-slate-200 hover:bg-slate-300 hover:w-10"
          ></button>
          <button
            aria-label="Slide 3"
            class="relative h-2.5 rounded-full overflow-hidden transition-all duration-300 cursor-pointer w-8 bg-slate-200 hover:bg-slate-300 hover:w-10"
          ></button>
          <button
            aria-label="Slide 4"
            class="relative h-2.5 rounded-full overflow-hidden transition-all duration-300 cursor-pointer w-8 bg-slate-200 hover:bg-slate-300 hover:w-10"
          ></button>
          <button
            aria-label="Slide 5"
            class="relative h-2.5 rounded-full overflow-hidden transition-all duration-300 cursor-pointer w-8 bg-slate-200 hover:bg-slate-300 hover:w-10"
          ></button>
          <button
            aria-label="Slide 6"
            class="relative h-2.5 rounded-full overflow-hidden transition-all duration-300 cursor-pointer w-8 bg-slate-200 hover:bg-slate-300 hover:w-10"
          ></button>
        </div>
      </div>

      <div class="relative lg:h-[600px] flex items-center">
        <div class="group relative w-full aspect-[4/3] lg:aspect-auto lg:h-full overflow-hidden shadow-2xl shadow-slate-200/50 z-10">
          <img
            data-hero-image="true"
            src="./exports/img/hero-1.png"
            alt="Spravujte svůj hotel, penzion i apartmány z jednoho místa"
            class="w-full h-full object-cover"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-black/35 via-black/5 to-transparent z-10 pointer-events-none"></div>
        </div>

        <!-- Overlay "bubliny" nad fotkou -->
        <div class="absolute inset-0 z-20 pointer-events-none">
          <div class="absolute -top-6 -right-6 bg-white p-4 rounded-2xl shadow-2xl border border-slate-100 flex items-center gap-4 min-w-[220px]">
            <div class="w-12 h-12 rounded-xl bg-primary-600 flex items-center justify-center shadow-inner shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock w-6 h-6 text-white">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
            </div>
            <div>
              <div data-hero-overlay-title-index="0" class="text-[10px] uppercase tracking-wider font-bold text-slate-400">Obsazenost</div>
              <div data-hero-overlay-value-index="0" class="text-base font-bold text-slate-900">94% dnes</div>
            </div>
          </div>

          <div class="absolute -bottom-6 -left-6 bg-white p-4 rounded-2xl shadow-2xl border border-slate-100 flex items-center gap-4 min-w-[220px]">
            <div class="w-12 h-12 rounded-xl bg-green-500 flex items-center justify-center shadow-inner shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-check w-6 h-6 text-white">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="m9 12 2 2 4-4"></path>
              </svg>
            </div>
            <div>
              <div data-hero-overlay-title-index="1" class="text-[10px] uppercase tracking-wider font-bold text-slate-400">Rezervace</div>
              <div data-hero-overlay-value-index="1" class="text-base font-bold text-slate-900">Nová objednávka</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="flex flex-col items-center mt-16 gap-1 text-slate-400 cursor-default select-none">
      <span class="text-xs tracking-widest uppercase">Posunout dolů</span>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-chevron-down w-5 h-5"
      >
        <path d="m6 9 6 6 6-6"></path>
      </svg>
    </div>
  </div>
</section>
